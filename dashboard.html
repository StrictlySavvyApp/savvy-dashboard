<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strictly Savvy — Team Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Strictly Savvy brand (extracted from strictlysavvy.co.nz) */
    --brand:        #EB1F57;   /* raspberry pink — primary */
    --brand-light:  #F2547D;
    --brand-dark:   #CD0139;   /* deep crimson — hover/emphasis */
    --ink:          #2E2E2E;   /* charcoal text/headings */
    --slate:        #404F4F;   /* secondary dark */
    --sage:         #6B8483;   /* muted teal accent */
    --accent:       #EB1F57;
    --danger:       #CD0139;
    --warning:      #E8853A;
    --success:      #2E9E6B;
    --text:         #2E2E2E;
    --text-muted:   #6B7280;
    --bg:           #F7F7F9;
    --surface:      #FFFFFF;
    --border:       #E8E8EC;
    --radius:       12px;
    --shadow:       0 1px 3px rgba(16,16,24,.06), 0 4px 16px rgba(16,16,24,.05);
    /* chart palette (for the other tabs) */
    --c-pink:#EB1F57; --c-peach:#F6A57A; --c-teal:#6B8483; --c-purple:#8B6CB3;
    --c-orange:#E8853A; --c-pink-light:#F7B7C9; --c-grey:#C9CDD2;
  }
  body { font-family: 'Mulish', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh;
         -webkit-font-smoothing: antialiased; }

  /* ── Layout ───────────────────────────────────────────────────────── */
  .header { background: var(--surface); color: var(--ink); padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 62px; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 18px; font-weight: 800; letter-spacing: -.4px;
               display: flex; align-items: center; }
  .brand-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--brand);
               display: inline-block; margin-right: 9px; box-shadow: 0 0 0 3px rgba(235,31,87,.15); }
  .header-sub { color: var(--text-muted); font-weight: 500; font-size: 14px; margin-left: 8px; }
  .data-meta { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.45; }
  .data-meta b { color: var(--ink); font-weight: 700; }
  .build-badge { color: var(--text-muted); opacity: .45; cursor: help; font-size: 15px; }
  #refreshBtn.spinning { display:inline-block; animation: spin .7s linear infinite; }
  #refreshBtn:hover { border-color: var(--brand); color: var(--brand); }
  .build-badge:hover { opacity: .9; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .refresh-info { color: var(--text-muted); }
  .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── Landing screen ───────────────────────────────────────────────── */
  #landing { display: flex; align-items: center; justify-content: center;
             min-height: calc(100vh - 60px); }
  .landing-card { background: var(--surface); border-radius: 16px;
                  box-shadow: var(--shadow); padding: 48px; width: 400px;
                  text-align: center; }
  .landing-card .logo { font-size: 48px; margin-bottom: 16px; }
  .landing-card h2 { font-size: 24px; color: var(--brand); margin-bottom: 8px; }
  .landing-card p  { color: var(--text-muted); margin-bottom: 28px; font-size: 14px; }

  /* ── Controls / Filters ───────────────────────────────────────────── */
  .controls { background: var(--surface); border-radius: var(--radius);
              padding: 16px 20px; margin-bottom: 20px; display: flex;
              gap: 16px; align-items: center; flex-wrap: wrap;
              box-shadow: var(--shadow); }
  .controls label { font-size: 12px; color: var(--text-muted); font-weight: 500;
                    margin-bottom: 4px; display: block; }
  .ctrl-group { display: flex; flex-direction: column; min-width: 160px; }

  /* ── Forms ────────────────────────────────────────────────────────── */
  select, input[type="text"], input[type="password"] {
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
    font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; transition: border-color .15s; width: 100%; }
  select:focus, input:focus { border-color: var(--brand); }

  /* ── Buttons ──────────────────────────────────────────────────────── */
  .btn { border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px;
         font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn-primary   { background: var(--brand); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-danger    { background: var(--danger); color: #fff; }
  .btn:hover     { opacity: .85; }
  .btn-sm        { padding: 6px 14px; font-size: 13px; }

  /* ── Tabs ─────────────────────────────────────────────────────────── */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border);
          padding-bottom: 0; }
  .tab { padding: 10px 18px; font-size: 14px; font-weight: 500; cursor: pointer;
         color: var(--text-muted); border-radius: 8px 8px 0 0; border: none;
         background: none; border-bottom: 2px solid transparent;
         margin-bottom: -2px; transition: all .15s; }
  .tab.active { color: var(--brand); border-bottom-color: var(--brand);
                background: var(--surface); }
  .tab:hover:not(.active) { color: var(--brand-light); background: rgba(45,74,107,.05); }

  /* ── Cards ────────────────────────────────────────────────────────── */
  .card { background: var(--surface); border-radius: var(--radius);
          box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--brand);
                margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* ── KPI tiles ────────────────────────────────────────────────────── */
  .kpi-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .kpi { background: var(--surface); border-radius: var(--radius);
         box-shadow: var(--shadow); padding: 16px 20px; flex: 1; min-width: 150px; }
  .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 500;
               text-transform: uppercase; letter-spacing: .5px;
               min-height: 2.8em; display: flex; align-items: flex-start; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--brand);
               margin: 4px 0 2px; line-height: 1; }
  .kpi-sub   { font-size: 12px; color: var(--text-muted); min-height: 2.6em; line-height: 1.3; }
  .kpi.danger .kpi-value { color: var(--danger); }
  .kpi.warning .kpi-value { color: var(--warning); }
  .kpi.success .kpi-value { color: var(--success); }

  /* ── Table ────────────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600;
       color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px;
       border-bottom: 2px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(45,74,107,.03); }
  th.num, td.num { text-align: right; }

  /* ── Progress bar ─────────────────────────────────────────────────── */
  .prog-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
  .prog-bar  { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .prog-fill.ok      { background: var(--success); }
  .prog-fill.warn    { background: var(--warning); }
  .prog-fill.over    { background: var(--danger); }
  .prog-pct  { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }

  /* ── Badges ───────────────────────────────────────────────────────── */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px;
           border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-over    { background: #FEE2E2; color: #991B1B; }
  .badge-warning { background: #FEF3C7; color: #92400E; }
  .badge-ok      { background: #D1FAE5; color: #065F46; }
  .badge-flexi   { background: #E0E7FF; color: #3730A3; }
  .badge-none    { background: var(--border); color: var(--text-muted); }

  /* ── Accordion (client breakdown) ────────────────────────────────── */
  .accordion-header { display: flex; align-items: center; justify-content: space-between;
                      padding: 12px 16px; cursor: pointer; border-radius: 8px;
                      transition: background .15s; user-select: none; }
  .accordion-header:hover { background: rgba(45,74,107,.05); }
  .accordion-header .chevron { transition: transform .2s; }
  .accordion-header.open .chevron { transform: rotate(180deg); }
  .accordion-body { display: none; padding: 0 8px 8px; }
  .accordion-body.open { display: block; }

  /* ── Chart containers ─────────────────────────────────────────────── */
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap-tall { position: relative; height: 420px; }

  /* ── PIN modal ────────────────────────────────────────────────────── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4);
                   display: flex; align-items: center; justify-content: center;
                   z-index: 200; }
  .modal { background: var(--surface); border-radius: 16px; padding: 32px;
           width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
  .modal h3 { margin-bottom: 8px; color: var(--brand); }
  .modal p  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .modal input { margin-bottom: 12px; text-align: center; font-size: 20px;
                 letter-spacing: 8px; }
  .modal-error { color: var(--danger); font-size: 13px; margin-bottom: 8px; }

  /* ── Empty / loading states ───────────────────────────────────────── */
  .loading { text-align: center; padding: 48px; color: var(--text-muted); }
  .loading-spinner { display: inline-block; width: 32px; height: 32px;
                     border: 3px solid var(--border); border-top-color: var(--brand);
                     border-radius: 50%; animation: spin .7s linear infinite;
                     margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: 14px; }

  /* ── Responsive ───────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .kpi-row { gap: 8px; }
    .kpi { min-width: calc(50% - 8px); }
    .controls { gap: 10px; }
    .ctrl-group { min-width: 130px; }
  }

  .hidden { display: none !important; }
  .text-muted { color: var(--text-muted); }
  .text-sm { font-size: 12px; }
  .mt-4 { margin-top: 4px; }
  .font-mono { font-variant-numeric: tabular-nums; }

  /* ── Project Health redesign ──────────────────────────────────────── */
  .ph-section { padding: 0; overflow: hidden; }
  .ph-section-head { display: flex; align-items: center; gap: 12px;
                     padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .ph-title { font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -.2px; }
  .ph-tag { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
            text-transform: uppercase; letter-spacing: .3px; }
  .tag-monthly    { background: rgba(107,132,131,.16); color: #3F5453; }
  .tag-cumulative { background: rgba(235,31,87,.10);  color: var(--brand-dark); }
  .tag-ceiling    { background: #FEE2E2; color: #991B1B; }
  .ph-meta { margin-left: auto; font-size: 12px; color: var(--text-muted); }
  .ph-meta b.over-text { color: var(--danger); }

  .ph-table th, .ph-table td { padding: 9px 10px; white-space: nowrap; }
  .ph-table td.ph-proj { white-space: normal; min-width: 210px; font-weight: 600; color: var(--ink); }
  .ph-table tr:hover td { background: rgba(235,31,87,.03); }
  .client-row td { background: var(--bg); border-bottom: 1px solid var(--border); padding: 8px 12px; }
  .client-row:hover td { background: var(--bg); }
  .client-name { font-weight: 800; color: var(--brand-dark); font-size: 13px; }
  .client-sub  { color: var(--text-muted); font-size: 12px; margin-left: 8px; font-weight: 600; }
  .mini-tag { display: inline-block; margin-left: 6px; font-size: 10px; font-weight: 700;
              color: var(--brand-dark); background: rgba(235,31,87,.10);
              padding: 1px 6px; border-radius: 6px; vertical-align: middle; text-transform: uppercase; }
  .ph-table td.nonbill { color: var(--warning); }
  .ph-ceiling .ph-section-head { background: linear-gradient(0deg, transparent, rgba(205,1,57,.05)); }

  /* KPI accents on brand */
  .kpi-value { color: var(--ink); }
  .kpi.brand .kpi-value { color: var(--brand); }

  /* Project Health: toolbar, collapsible client rows, internal column */
  .ph-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
                font-size: 13px; color: var(--text-muted); }
  .ph-toolbar-label { font-weight: 700; }
  .ph-sort { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
             padding: 5px 13px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer;
             font-family: inherit; transition: all .12s; }
  .ph-sort:hover { border-color: var(--brand); color: var(--brand); }
  .ph-sort.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .ph-hint { margin-left: auto; font-style: italic; }
  .client-row { cursor: pointer; }
  .client-row .arrow { display: inline-block; color: var(--brand); font-weight: 800;
                       transition: transform .15s; margin-right: 2px; }
  .client-row.open .arrow { transform: rotate(90deg); }
  .proj-hidden { display: none; }
  .proj-row td.ph-proj { padding-left: 30px; font-weight: 500; }
  .ph-start { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .note-ico { cursor: help; font-size: 12px; margin-left: 3px; vertical-align: middle; opacity: .8; }
  .note-ico:hover { opacity: 1; }
  .ph-table td.col-internal { color: var(--sage); }
  .badge-internal { background: rgba(107,132,131,.18); color: #3F5453; }
  .mini-internal { color: var(--sage) !important; background: rgba(107,132,131,.15) !important; }
  .auto-setup-row td.ph-proj { font-style: italic; }

  /* Project Health: view toggle, charts, client-history controls */
  .ph-view-toggle { display: inline-flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
                    border-radius: 999px; padding: 4px; margin-bottom: 16px; }
  .ph-vbtn { border: none; background: none; color: var(--text-muted); font-family: inherit;
             font-size: 13px; font-weight: 700; padding: 7px 18px; border-radius: 999px; cursor: pointer; transition: all .12s; }
  .ph-vbtn.active { background: var(--brand); color: #fff; }
  .ph-chart-row { padding: 10px 20px 6px; }
  .ph-chart-wrap { position: relative; height: 460px; }
  .ph-chart-wrap.ph-chart-tall { height: 440px; }
  .ch-controls { display: flex; gap: 16px; align-items: flex-end; padding: 4px 20px 12px; flex-wrap: wrap; }
  .ch-controls .ctrl-group { min-width: 240px; }
  .ch-note { padding: 0 20px 16px; font-size: 12px; color: var(--text-muted); }
  .ch-block-title { padding: 4px 20px 6px; font-size: 15px; font-weight: 800; color: var(--text); }
  .ch-proj-sub { margin: 18px 0 2px; padding: 10px 20px 6px; font-size: 13px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--brand); border-top: 2px solid var(--border); }
  .ch-proj-block { padding-top: 6px; }
  .ch-cum-tag { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: #33373D; background: #EDEFF2; border-radius: 10px; padding: 1px 8px; vertical-align: middle; }
  .ch-cum-note { background: #FBF3D9; border-left: 3px solid #E8C13A; margin: 0 20px 8px; padding: 8px 12px; border-radius: 0 6px 6px 0; color: var(--text); }
  .ch-cum-tag.invest { color: #2C6E6A; background: #DCEEEC; }
  .ch-invest-note { background: #E7F1F0; border-left-color: #46B29D; }
  .status-cell { white-space: nowrap; }
  .ch-jump { margin-left: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--brand);
             font-family: inherit; font-size: 13px; font-weight: 700; line-height: 1; padding: 4px 8px; border-radius: 999px;
             cursor: pointer; transition: all .12s; }
  .ch-jump:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* Team Utilisation: trend/comparison */
  .tu-trend-title { font-weight: 800; color: var(--ink); font-size: 14px; padding: 12px 20px 0; }
  .ph-sub { font-weight: 700; color: var(--text-muted); font-size: 12px; text-transform: uppercase;
            letter-spacing: .4px; padding: 14px 20px 0; }
  .tu-team-checks { display: flex; flex-wrap: wrap; gap: 8px 16px; padding-top: 4px; }
  .tu-check { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text);
              font-weight: 600; cursor: pointer; }
  .tu-check input { width: auto; }

  /* Commission: history pivot + leadership grand total */
  .pivot-table { table-layout: fixed; }
  .pivot-table th, .pivot-table td { white-space: nowrap; }
  .pivot-bar-cell { position: relative; padding: 4px 2px !important; }
  .pivot-bar { height: 22px; background: #EE5C86; border-radius: 0 4px 4px 0; }
  .grand-total td { border-top: 2px solid var(--border); background: var(--bg); }
</style>
</head>
<body>

<!-- Sign-in gate (Google Sign-In allowlist) — covers everything until authorised -->
<div id="signinGate" style="position:fixed; inset:0; background:#F7F8FA; z-index:99999; display:flex; align-items:center; justify-content:center; font-family:'Mulish',system-ui,sans-serif;">
  <div style="text-align:center; background:#fff; border:1px solid #E5E7EB; border-radius:16px; padding:36px 40px; max-width:420px; box-shadow:0 8px 30px rgba(0,0,0,.08);">
    <h1 style="color:#EB1F57; font-size:22px; font-weight:800; margin:0 0 8px;">Savvy Dashboard</h1>
    <p id="signinMsg" style="color:#6B7280; font-size:14px; margin:0 0 20px;">Sign in with your Google account to continue.</p>
    <div id="gbtn" style="display:flex; justify-content:center;"></div>
    <div id="signinErr" style="color:#EB1F57; font-weight:700; font-size:13px; margin-top:14px;"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════════════════════════════════════ -->
<header class="header">
  <h1><span class="brand-dot"></span>Strictly Savvy<span class="header-sub">Team Dashboard</span></h1>
  <div class="header-right">
    <div class="data-meta" id="dataMeta"></div>
    <span class="build-badge" title="build 2026-06-26·r">&#9432;</span>
    <span class="refresh-info" id="refreshInfo"></span>
    <button class="btn btn-secondary btn-sm" onclick="logout()" id="logoutBtn" style="display:none">
      Sign out
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════════════════
     LANDING SCREEN
══════════════════════════════════════════════════════════════════════════════ -->
<div id="landing">
  <div class="landing-card">
    <div class="logo">📊</div>
    <h2>Welcome</h2>
    <p>Select your name to view your personalised dashboard.</p>
    <div class="ctrl-group" style="margin-bottom:20px;">
      <label>Who are you?</label>
      <select id="userSelect" onchange="onUserSelect()">
        <option value="">— Loading team members… —</option>
      </select>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="loadDashboard()" id="goBtn" disabled>
      View Dashboard →
    </button>
    <p style="margin-top:16px; font-size:12px" id="landingError" class="text-muted"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MAIN DASHBOARD (hidden until user selects)
══════════════════════════════════════════════════════════════════════════════ -->
<div id="dashboard" class="main hidden">

  <!-- Controls bar -->
  <div class="controls">
    <div class="ctrl-group">
      <label>Month</label>
      <select id="monthSelect" onchange="onMonthChange()"></select>
    </div>
    <div class="ctrl-group" id="ownerFilterWrap" style="display:none">
      <label>Focus on team member</label>
      <select id="ownerFilter" onchange="onMemberFilterChange()">
        <option value="">All team members</option>
      </select>
    </div>
    <div class="ctrl-group" id="teamFilterWrap" style="display:none">
      <label>Filter by Team</label>
      <select id="teamFilter" onchange="applyFilters()">
        <option value="">All Teams</option>
      </select>
    </div>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <button type="button" id="refreshBtn" onclick="forceRefresh()" title="Refresh data now" style="font-size:14px; font-weight:700; color:var(--text-muted); background:#fff; border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; line-height:1;">↻</button>
      <div id="adminMenu" style="display:none; position:relative;">
        <button type="button" onclick="toggleAdminMenu(event)" style="font-size:13px; font-weight:700; color:var(--brand); background:#fff; border:1px solid var(--brand); border-radius:8px; padding:6px 11px; cursor:pointer;">⚙ Admin ▾</button>
        <div id="adminMenuDrop" style="display:none; position:absolute; right:0; top:calc(100% + 6px); background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.14); min-width:180px; overflow:hidden; z-index:60;">
